name: CPython compiler/execution proof

on:
  push:
    branches:
      - ci/compiler-exec-proof
    paths:
      - ".github/workflows/compiler-exec-proof.yml"
      - "Tools/compiler_exec_proofs/**"
  workflow_dispatch:
    inputs:
      case_filter:
        description: "Optional substring filter for generated case names"
        default: ""
        required: false

permissions:
  contents: read

jobs:
  tier2-compare:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout CPython fork branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Record checkout
        run: |
          git rev-parse HEAD
          git status --short

      - name: Install CPython build dependencies
        run: sudo bash .github/workflows/posix-deps-apt.sh

      - name: Configure CPython with tier-2 interpreter
        run: ./configure --enable-experimental-jit=interpreter --with-pydebug

      - name: Build CPython
        run: make -j4

      - name: Runtime info
        run: |
          ./python -VV
          ./python - <<'PY'
          import _opcode
          import os
          import sys
          print("sys._jit.available", sys._jit.is_available())
          print("sys._jit.enabled", sys._jit.is_enabled())
          print("specialization", _opcode.ENABLE_SPECIALIZATION)
          print("PYTHON_JIT", os.environ.get("PYTHON_JIT"))
          PY

      - name: Compare compiler/runtime modes
        env:
          CASE_FILTER: ${{ github.event_name == 'workflow_dispatch' && inputs.case_filter || '' }}
        run: ./python Tools/compiler_exec_proofs/mode_compare.py

      - name: Run generated compiler/runtime differential suite
        run: ./python Tools/compiler_exec_proofs/generated_compare.py

      - name: Run synthesized compiler/runtime differential suite
        env:
          CASE_FILTER: ${{ github.event_name == 'workflow_dispatch' && inputs.case_filter || '' }}
        run: ./python Tools/compiler_exec_proofs/synthesized_compare.py

      - name: Run compiler/runtime stress differential suite
        env:
          CASE_FILTER: ${{ github.event_name == 'workflow_dispatch' && inputs.case_filter || '' }}
        run: ./python Tools/compiler_exec_proofs/stress_compare.py

      - name: Run generator frame differential suite
        env:
          CASE_FILTER: ${{ github.event_name == 'workflow_dispatch' && inputs.case_filter || '' }}
        run: ./python Tools/compiler_exec_proofs/generator_frame_compare.py

      - name: Run lazy dotted import suite
        env:
          CASE_FILTER: ${{ github.event_name == 'workflow_dispatch' && inputs.case_filter || '' }}
        run: ./python Tools/compiler_exec_proofs/lazy_import_dotted_compare.py

      - name: Run lazy import context suite
        env:
          CASE_FILTER: ${{ github.event_name == 'workflow_dispatch' && inputs.case_filter || '' }}
        run: ./python Tools/compiler_exec_proofs/lazy_import_context_compare.py

      - name: Run trace injection catchability suite
        run: ./python Tools/compiler_exec_proofs/trace_injection_compare.py

      - name: Run cleanup interrupt suite
        run: ./python Tools/compiler_exec_proofs/cleanup_interrupt_compare.py

      - name: Run focused compiler/runtime regression tests
        run: >
          ./python -m test -j2
          test_ast
          test_compile
          test_compiler_assemble
          test_compiler_codegen
          test_dis
          test_grammar
          test_lazy_import
          test_monitoring
          test_opcodes
          test_symtable
          test_trace

      - name: Run focused compiler/runtime regression tests without uop optimization
        env:
          PYTHON_JIT: "1"
          PYTHON_UOPS_OPTIMIZE: "0"
        run: >
          ./python -m test -j2
          test_ast
          test_compile
          test_compiler_assemble
          test_compiler_codegen
          test_dis
          test_grammar
          test_lazy_import
          test_monitoring
          test_opcodes
          test_symtable
          test_trace
